<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>페이지를 찾을 수 없어요 · 토닥</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital@0;1&family=Nanum+Myeongjo:wght@400;700&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *{margin:0;box-sizing:border-box}
    body{min-height:100vh;display:grid;place-items:center;background:#E7E3D7;
      font-family:'Noto Sans KR',sans-serif;color:#2A2A24;text-align:center;padding:24px}
    .card{background:#F3F0E7;border:1px solid #D6D0C0;border-radius:2rem;
      padding:56px 40px;max-width:460px;box-shadow:0 40px 90px -50px rgba(46,58,35,.45)}
    .mark{font-family:'Lora','Nanum Myeongjo',serif;font-style:italic;font-size:1.4rem;color:#2E3A23}
    h1{font-family:'Nanum Myeongjo',serif;font-size:3.4rem;color:#2E3A23;margin:14px 0 6px}
    p{color:#6E6A5C;line-height:1.8;margin-bottom:28px}
    a{display:inline-flex;align-items:center;gap:8px;background:#2E3A23;color:#F3F0E7;
      text-decoration:none;font-weight:600;padding:14px 26px;border-radius:999px;
      transition:transform .4s ease-out,box-shadow .4s ease-out}
    a:hover{transform:translateY(-2px);box-shadow:0 16px 30px -14px rgba(46,58,35,.5)}
  </style>
</head>
<body>
  <main class="card">
    <span class="mark">토닥</span>
    <h1>404</h1>
    <p>찾으시는 페이지가 흐려졌어요.<br/>순간은 흐르고, 기록은 남도록 — 처음으로 돌아가 볼까요.</p>
    <a href="/">홈으로 돌아가기 →</a>
  </main>
</body>
</html>
