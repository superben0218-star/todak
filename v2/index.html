<!DOCTYPE html>
<html lang="ko">
<head>

  <style>
    :root{ --bg:#FDFDFC; --ink:#1c1a17; --muted:#8a847b; --forest:#2F6A4A; --line:#e9e5dd; }
    *{ box-sizing:border-box; }
    html{ scroll-behavior:auto; }
    body{ margin:0; background:var(--bg); color:var(--ink);
      font-family:'Raleway','Noto Sans KR',system-ui,sans-serif; -webkit-font-smoothing:antialiased; overflow-x:hidden; }
    .myeongjo{ font-family:'Nanum Myeongjo','Lora',serif; }

    /* fixed Three.js frame-animation stage */
    #stage{ position:fixed; inset:0; z-index:0; }
    #stage canvas{ display:block; width:100%!important; height:100%!important; }

    #loader{ position:fixed; inset:0; z-index:50; display:grid; place-items:center; background:var(--bg); transition:opacity .7s ease; }
    #loader.hide{ opacity:0; pointer-events:none; }
    #loader .mark{ font-family:'Nanum Myeongjo',serif; font-weight:800; color:var(--forest); font-size:1.9rem; letter-spacing:.12em; }
    #lbar{ margin-top:16px; width:140px; height:2px; background:#eceae4; border-radius:9px; overflow:hidden; }
    #lbar i{ display:block; height:100%; width:0; background:var(--forest); transition:width .15s ease; }

    #progress{ position:fixed; top:0; left:0; height:2px; width:0; z-index:40;
      background:linear-gradient(90deg,#2F6A4A,#8A9A4B); }

    /* scroll length only */
    #scroller{ height:480vh; }
    /* captions pinned to the clean top zone (above the diary), cross-faded by scroll progress */
    .captions{ position:fixed; inset:0; z-index:10; pointer-events:none; }
    .cap-item{ position:absolute; top:8.5vh; left:0; right:0; padding:0 6vw; text-align:center;
      opacity:0; transition:opacity .12s linear; }
    .cap-item .inner{ position:relative; max-width:820px; margin:0 auto; }
    .cap-item .inner::before{ content:''; position:absolute; inset:-30% -18%; z-index:-1;
      background:radial-gradient(64% 62% at 50% 46%, rgba(253,253,252,.99) 0%, rgba(253,253,252,.95) 46%, rgba(253,253,252,.55) 68%, rgba(253,253,252,0) 82%);
      filter:blur(12px); pointer-events:none; }
    /* per-glyph white glow → stays crisp even where the diary rises behind the text */
    .cap-item .kicker, .cap-item .head, .cap-item .cap, .cap-item .sub{
      text-shadow:0 1px 2px rgba(253,253,252,.95), 0 0 10px rgba(253,253,252,.92), 0 0 22px rgba(253,253,252,.85); }
    .sr-only{ position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); border:0; }
    .reg{ display:flex; gap:.6rem; justify-content:center; align-items:center; margin-top:1.6rem; flex-wrap:wrap; }
    .reg input[type=email]{ width:min(330px,76vw); padding:.92rem 1.3rem; border-radius:999px;
      border:1px solid var(--line); background:#fff; color:var(--ink); font-size:1rem; outline:none;
      box-shadow:0 8px 24px -16px rgba(22,24,26,.4); }
    .reg input[type=email]::placeholder{ color:#aba59a; }
    .reg input[type=email]:focus{ border-color:var(--forest); }
    .reg .btn{ margin-top:0; }
    .regmsg{ margin-top:1rem; min-height:1.25rem; color:var(--forest); font-weight:600; font-size:.95rem;
      text-shadow:0 1px 2px rgba(253,253,252,.95), 0 0 10px rgba(253,253,252,.9); }
    .kicker{ font-size:.72rem; font-weight:600; letter-spacing:.24em; text-transform:uppercase; color:var(--forest); }
    h1.head{ font-family:'Nanum Myeongjo',serif; font-weight:800; line-height:1.18;
      font-size:clamp(2rem,4.8vw,3.3rem); margin:.6rem 0 0; color:var(--ink); }
    h2.cap{ font-family:'Nanum Myeongjo',serif; font-weight:700; line-height:1.22;
      font-size:clamp(1.6rem,4vw,2.8rem); margin:0; color:var(--ink); }
    .sub{ margin-top:1.1rem; color:var(--muted); font-size:clamp(1rem,1.6vw,1.18rem); line-height:1.7; }
    .accent{ color:var(--forest); font-style:italic; }

    .btn{ display:inline-flex; align-items:center; gap:.5rem; margin-top:1.8rem; padding:.95rem 1.7rem;
      border-radius:999px; background:var(--forest); color:#fff; font-weight:600; text-decoration:none;
      transition:transform .25s cubic-bezier(.2,.7,.2,1), background-color .25s; }
    .btn:hover{ transform:translateY(-2px); background:#234E37; }

    .hint{ position:fixed; left:50%; bottom:26px; transform:translateX(-50%); z-index:20;
      color:var(--muted); font-size:.72rem; letter-spacing:.2em; display:flex; flex-direction:column; align-items:center; gap:7px; }
    .hint .l{ width:1px; height:30px; background:var(--muted); opacity:.5; animation:sc 1.8s ease-in-out infinite; transform-origin:top; }
    @keyframes sc{ 0%,100%{ transform:scaleY(.4); opacity:.2 } 50%{ transform:scaleY(1); opacity:.6 } }

    @media (prefers-reduced-motion: reduce){ .hint .l{ animation:none } }
  </style>
</head>
<body>
  <div id="loader"><div style="text-align:center"><div class="mark">토닥</div><div id="lbar"><i></i></div></div></div>
  <div id="progress"></div>
  <div id="stage"></div>

  <div class="hint"><span>SCROLL</span><span class="l"></span></div>

  <div id="scroller"></div>

  <div class="captions">
    <div class="cap-item" data-c="0.04" data-w="0.16">
      <div class="inner">
        <p class="kicker">토닥 · TODAK</p>
        <h1 class="head">흩어진 하루가<br/><span class="accent">한 권의 추억으로</span></h1>
      </div>
    </div>

    <div class="cap-item" data-c="0.30" data-w="0.14">
      <div class="inner">
        <h2 class="cap">한마디면 기록 끝,<br/><span class="accent">정리는 AI가.</span></h2>
        <p class="sub">“수유 180”, 한마디면 AI가 시간·양·맥락을 알아서 정리해요.</p>
      </div>
    </div>

    <div class="cap-item" data-c="0.52" data-w="0.14">
      <div class="inner">
        <h2 class="cap">임신부터 육아까지,<br/>흘러가는 모든 순간.</h2>
        <p class="sub">매일의 작은 기록이 한 장 한 장 쌓여요.</p>
      </div>
    </div>

    <div class="cap-item" data-c="0.72" data-w="0.14">
      <div class="inner">
        <h2 class="cap">특별한 날엔,<br/><span class="accent">한 권의 추억으로</span></h2>
        <p class="sub">100일·첫 생일, AI가 그동안의 기록과 사진을 추억 카드로 엮어드려요.</p>
      </div>
    </div>

    <div class="cap-item cta" data-c="1.0" data-w="0.18">
      <div class="inner">
        <h2 class="cap">우리 아이의 첫 기록,<br/><span class="accent">토닥과 함께</span></h2>
        <p class="sub">2026 출시 · 지금 사전등록하면 첫 달 프리미엄 무료.</p>
        <form id="reg" class="reg" novalidate>
          <label for="email" class="sr-only">이메일 주소</label>
          <input id="email" name="email" type="email" required autocomplete="email" placeholder="이메일 주소" />
          <input type="hidden" name="access_key" value="57b6f196-6b69-4718-a66e-0323c663390a" />
          <input type="hidden" name="subject" value="토닥 사전등록 신청 (스크롤 페이지)" />
          <input type="hidden" name="from_name" value="토닥 사전등록" />
          <input type="checkbox" name="botcheck" tabindex="-1" autocomplete="off" aria-hidden="true" style="display:none" />
          <button id="regBtn" type="submit" class="btn">사전등록</button>
        </form>
        <p id="regMsg" class="regmsg" role="status" aria-live="polite"></p>
      </div>
    </div>
  </div>

  <script>
    const N = 121;
    const pad = n => 'frames/frame_' + String(n).padStart(4,'0') + '.jpg';
    const frames = [];
    let loaded = 0, started = false, kickRef = null;
    const lbar = document.querySelector('#lbar i');
    const loaderEl = document.getElementById('loader');
    const progressEl = document.getElementById('progress');
    const hintEl = document.querySelector('.hint');
    const items = [...document.querySelectorAll('.cap-item')];

    for (let i=1; i<=N; i++){
      const im = new Image();
      im.decoding = 'async';
      im.onload = im.onerror = () => {
        loaded++;
        lbar.style.width = Math.round(loaded/N*100) + '%';
        if (!started && loaded >= Math.min(N, 12)) { started = true; start(); }  // 점진적 시작: 처음 몇 장만 받으면 시작, 나머지는 백그라운드 로드
        else if (started && kickRef) kickRef();                                   // 새 프레임 도착 → 필요 시 1회 재페인트
      };
      im.src = pad(i);
      frames.push(im);
    }

    function updateCaptions(p){
      for (const it of items){
        const c = +it.dataset.c, w = +it.dataset.w;
        const o = Math.max(0, 1 - Math.abs(p - c)/w);
        it.style.opacity = o.toFixed(3);
        it.style.transform = 'translateY(' + ((1-o)*12).toFixed(1) + 'px)';
        if (it.classList.contains('cta')) it.style.pointerEvents = o > 0.45 ? 'auto' : 'none';
      }
    }

    function start(){
      // 가벼운 2D 캔버스 (WebGL 제거)
      const stage = document.getElementById('stage');
      const cv = document.createElement('canvas');
      cv.style.display = 'block';
      stage.appendChild(cv);
      const ctx = cv.getContext('2d', { alpha:false });
      let W, H, DPR, lastIdx = -1, cur = 0, running = false;

      function sizeCanvas(){
        W = innerWidth; H = innerHeight;
        DPR = Math.min(devicePixelRatio || 1, 1.5);   // 모바일 픽셀 부하 절반
        cv.width = Math.floor(W*DPR); cv.height = Math.floor(H*DPR);
        cv.style.width = W+'px'; cv.style.height = H+'px';
        lastIdx = -1;
      }
      sizeCanvas();

      function draw(idx){
        const img = frames[idx];
        if (!img || !img.complete || !img.naturalWidth) return false;
        const cw = cv.width, ch = cv.height, iw = img.naturalWidth, ih = img.naturalHeight;
        ctx.fillStyle = '#FDFDFC'; ctx.fillRect(0,0,cw,ch);
        const portrait = ch > cw * 1.05;
        const topPad = ch * (portrait ? 0.24 : 0.30);
        const budgetH = ch - topPad - ch*0.05;
        const s = Math.min(cw*(portrait ? 0.98 : 0.80)/iw, budgetH/ih);
        const w = iw*s, h = ih*s;
        const dx = (cw - w)/2, dy = topPad + (budgetH - h)/2;
        ctx.drawImage(img, dx, dy, w, h);
        // feather the frame edges into the clean bg so the rectangle boundary is invisible
        const C0 = '#FDFDFC', C1 = 'rgba(253,253,252,0)';
        const fw = w*0.07, fh = h*0.07;
        let g;
        g = ctx.createLinearGradient(0, dy, 0, dy+fh); g.addColorStop(0,C0); g.addColorStop(1,C1); ctx.fillStyle=g; ctx.fillRect(dx-1, dy, w+2, fh);
        g = ctx.createLinearGradient(0, dy+h, 0, dy+h-fh); g.addColorStop(0,C0); g.addColorStop(1,C1); ctx.fillStyle=g; ctx.fillRect(dx-1, dy+h-fh, w+2, fh);
        g = ctx.createLinearGradient(dx, 0, dx+fw, 0); g.addColorStop(0,C0); g.addColorStop(1,C1); ctx.fillStyle=g; ctx.fillRect(dx, dy-1, fw, h+2);
        g = ctx.createLinearGradient(dx+w, 0, dx+w-fw, 0); g.addColorStop(0,C0); g.addColorStop(1,C1); ctx.fillStyle=g; ctx.fillRect(dx+w-fw, dy-1, fw, h+2);
        return true;
      }

      // idle 렌더: 스크롤/스무딩 중일 때만 rAF 돌고, 멈추면 루프 종료 (발열·렉 제거)
      function frame(){
        const max = document.documentElement.scrollHeight - innerHeight;
        const p = max>0 ? Math.min(1, Math.max(0, scrollY/max)) : 0;
        progressEl.style.width = (p*100) + '%';
        hintEl.style.opacity = p > 0.02 ? '0' : '1';
        const target = p * (N-1);
        cur += (target - cur) * 0.18;
        if (Math.abs(target - cur) < 0.01) cur = target;   // 정착 → 루프 종료 조건
        const idx = Math.max(0, Math.min(N-1, Math.round(cur)));
        if (idx !== lastIdx){ if (draw(idx)) lastIdx = idx; }
        updateCaptions(p);
        if (cur !== target) requestAnimationFrame(frame);
        else running = false;
      }
      function kick(){ if (!running){ running = true; requestAnimationFrame(frame); } }
      kickRef = kick;

      addEventListener('scroll', kick, { passive:true });
      let rt;
      addEventListener('resize', () => { clearTimeout(rt); rt = setTimeout(() => { sizeCanvas(); kick(); }, 120); }, { passive:true });

      loaderEl.classList.add('hide');
      draw(0); updateCaptions(0); kick();
    }

    /* ---------- 사전등록 폼 (Web3Forms, 라이브와 동일 키) ---------- */
    const form = document.getElementById('reg');
    const msg = document.getElementById('regMsg');
    const btn = document.getElementById('regBtn');
    const emailValid = v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
    form.addEventListener('submit', async e => {
      e.preventDefault();
      if (form.elements['botcheck'] && form.elements['botcheck'].checked) return;
      const email = document.getElementById('email'), v = email.value.trim();
      if (!emailValid(v)) { msg.style.color = '#b4452f'; msg.textContent = '올바른 이메일 주소를 입력해 주세요.'; email.focus(); return; }
      const original = btn.textContent; btn.disabled = true; btn.textContent = '등록 중…'; msg.textContent = '';
      try {
        const res = await fetch('https://api.web3forms.com/submit', { method:'POST', headers:{ 'Accept':'application/json' }, body:new FormData(form) });
        if (res.ok) { msg.style.color = '#2F6A4A'; msg.textContent = '사전등록이 완료됐어요. 출시 소식을 가장 먼저 전해드릴게요.'; form.reset(); }
        else { msg.style.color = '#b4452f'; msg.textContent = '잠시 후 다시 시도해 주세요.'; }
      } catch (_) { msg.style.color = '#b4452f'; msg.textContent = '네트워크 오류예요. 잠시 후 다시 시도해 주세요.'; }
      finally { btn.disabled = false; btn.textContent = original; }
    });
  </script>
</body>
</html>
